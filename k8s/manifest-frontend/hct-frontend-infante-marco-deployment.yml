apiVersion: apps/v1
kind: Deployment
metadata:
  name: hct-frontend-deployment
  namespace: hct-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hct-frontend
  template:
    metadata:
      labels:
        app: hct-frontend
    spec:
      containers:
        - name: hct-frontend
          image: marco2909/hct-frontend:latest
          ports:
            - containerPort: 80